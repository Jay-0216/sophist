<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sophist - 당신의 논리적 대변인</title>
  <meta name="description" content="말싸움, 이제 논리적으로 이기세요. Sophist가 대신 반박해 드립니다.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script type="importmap">
    {
      "imports": {
        "@google/genai": "https://esm.run/@google/genai"
      }
    }
  </script>
</head>

<body>
  <div class="background-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <main class="app-container">
    <header class="glass-panel header">
      <div class="header-top">
        <h1>Sophist</h1>
        <button id="theme-toggle" class="icon-btn theme-btn" title="테마 변경">
          <svg id="sun-icon" class="hidden" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor"
            stroke-width="2">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
          <svg id="moon-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor"
            stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
      </div>
      <p>당신의 논리적 대변인</p>
    </header>

    <section class="glass-panel settings-panel">
      <div class="setting-group">
        <label for="model-select">지능 모델</label>
        <select id="model-select">
          <option value="gemini-3.1-pro">Gemini 3.1 Pro</option>
          <option value="gemini-3-pro">Gemini 3 Pro</option>
          <option value="gemini-3-flash">Gemini 3 Flash</option>
          <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
          <option value="gemini-2.5-flash" selected>Gemini 2.5 Flash (추천)</option>
          <option value="gemini-2.0-pro-exp-02-05">Gemini 2.0 Pro</option>
          <option value="gemini-2.0-flash-exp">Gemini 2.0 Flash</option>
          <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
          <option value="gemini-1.5-flash">Gemini 1.5 Flash</option>
        </select>
      </div>
      <div class="setting-group">
        <label for="tone-select">대응 스타일</label>
        <select id="tone-select">
          <option value="gentle">부드럽게 설득하듯이</option>
          <option value="critical" selected>상대의 말을 비판하면서</option>
          <option value="sarcastic">약간 비꼬듯이</option>
          <option value="emotional">감정적으로 상대를 설득</option>
          <option value="nerd">덕후처럼 열심히 설명을 늘어놓음</option>
        </select>
      </div>

      <div class="setting-group api-key-group">
        <div class="label-with-help">
          <label for="api-key-input">Gemini API 키</label>
          <button type="button" id="api-help-btn" class="help-circle">?</button>
        </div>
        <input type="password" id="api-key-input" placeholder="AI 사용을 위해 API 키를 입력하세요">
        <div class="save-key-row">
          <label class="toggle-container small">
            <input type="checkbox" id="save-api-key">
            <span class="toggle-text">API 키 기억하기 (암호화되어 저장됨)</span>
          </label>
        </div>

        <div id="api-instructions" class="help-box hidden">
          <h3>API 키 발급 방법</h3>
          <ol>
            <li><a href="https://aistudio.google.com/" target="_blank">Google AI Studio</a>에 접속합니다.</li>
            <li>구글 계정으로 로그인합니다.</li>
            <li>왼쪽 메뉴에서 <strong>'Get API key'</strong> (또는 API 키)를 누릅니다.</li>
            <li><strong>'Create API key in new project'</strong> 버튼을 눌러 키를 생성합니다.</li>
            <li>생성된 API 키를 복사해서 아래 칸에 붙여넣으세요.</li>
          </ol>
        </div>
      </div>
    </section>

    <!-- 대화 연동 모드 -->
    <div class="conversation-mode-controls">
      <button id="conv-mode-btn" class="primary-btn pulse">대화 연동 모드 시작 (웹캠/마이크 연결)</button>
      <button id="conv-stop-btn" class="secondary-btn hidden">대화 중지</button>
    </div>

    <section class="glass-panel input-panel">
      <div class="input-header">
        <div class="mode-toggle-container">
          <h2 id="main-panel-title">상대의 논리</h2>
          <div class="switch-wrapper">
            <span class="switch-label active" id="label-criticize">반박</span>
            <label class="switch">
              <input type="checkbox" id="sophist-mode-toggle">
              <span class="slider round"></span>
            </label>
            <span class="switch-label" id="label-support">내 편</span>
          </div>
        </div>
        <button id="stt-btn" class="icon-btn" title="음성 인식 시작">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
            <line x1="12" y1="19" x2="12" y2="23"></line>
            <line x1="8" y1="23" x2="16" y2="23"></line>
          </svg>
        </button>
      </div>
      <textarea id="opponent-input" placeholder="상대방이 뭐라고 했나요? 음성 인식을 쓰거나 직접 입력하세요..."></textarea>

      <div class="media-upload-area">
        <label for="media-upload" class="upload-btn">
          <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"
            stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <circle cx="8.5" cy="8.5" r="1.5"></circle>
            <polyline points="21 15 16 10 5 21"></polyline>
          </svg>
          사진/영상 첨부
        </label>
        <input type="file" id="media-upload" accept="image/*,video/*">
        <span id="file-name">선택된 파일 없음</span>
      </div>
      <img id="image-preview" class="hidden" alt="미리보기"
        style="max-width: 100%; max-height: 200px; border-radius: 8px; margin-top: 10px;" />
      <video id="video-preview" class="hidden"
        style="max-width: 100%; max-height: 200px; border-radius: 8px; margin-top: 10px;" controls></video>

      <div class="action-bar">
        <label class="toggle-container">
          <input type="checkbox" id="keep-history" checked>
          <span class="toggle-text">이어서 반박하기 (대화 유지)</span>
        </label>
        <button id="clear-history" class="text-btn">대화 기록 초기화</button>
      </div>

      <button id="submit-btn" class="primary-btn">
        <span id="submit-btn-text">반박 논리 생성하기</span>
        <div class="loader hidden" id="spinner"></div>
      </button>
      <div id="error-message" class="error-text hidden"></div>
    </section>

    <section class="glass-panel output-panel hidden" id="output-panel">
      <div class="output-header">
        <h2 id="output-panel-title">Sophist의 반박</h2>
        <button id="tts-btn" class="icon-btn" title="답변 읽어주기">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
          </svg>
        </button>
      </div>
      <div id="ai-response" class="response-content">
        <!-- AI 응답이 여기에 렌더링 됩니다 -->
      </div>
      <div class="output-actions">
        <button id="copy-btn" class="secondary-btn">복사하기</button>
      </div>

      <!-- 이어서 반박하기 전용 입력창 -->
      <div id="continuation-area" class="continuation-box hidden">
        <div class="input-header">
          <h3 id="follow-up-title">상대의 재반박</h3>
          <button id="stt-btn-follow" class="icon-btn" title="음성 인식 시작">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
              <line x1="12" y1="19" x2="12" y2="23"></line>
              <line x1="8" y1="23" x2="16" y2="23"></line>
            </svg>
          </button>
        </div>
        <textarea id="follow-up-input" placeholder="Sophist의 논리에 살을 붙이거나, 상대의 재반박을 입력하세요..."></textarea>
        <button id="submit-btn-follow" class="primary-btn small">
          <span>이어서 반박 생성</span>
          <div class="loader hidden"></div>
        </button>
      </div>
    </section>
  </main>

  <!-- Gemini Live Style Overlay -->
  <div id="live-overlay" class="live-overlay hidden">
    <div class="live-content">
      <div class="live-status-container">
        <div class="live-visualizer">
          <div class="wave"></div>
          <div class="wave"></div>
          <div class="wave"></div>
        </div>
        <p id="live-status-text">Sophist가 듣고 있습니다...</p>
      </div>

      <div class="live-transcript-container">
        <p id="live-user-transcript"></p>
        <p id="live-ai-response"></p>
      </div>

      <div class="live-webcam-container">
        <video id="webcam-preview" autoplay playsinline muted></video>
        <canvas id="webcam-canvas" class="hidden"></canvas>
      </div>

      <div class="live-controls">
        <button id="toggle-webcam-btn" class="secondary-btn rounded">카메라 끄기</button>
        <button id="conv-stop-btn-live" class="stop-btn">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
            <path d="M6 6h12v12H6z" />
          </svg>
          종료
        </button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    // 도움말 버튼 토글 - 모듈 시스템 없이 실행되도록 인라인으로 작성
    document.addEventListener('DOMContentLoaded', () => {
      const helpBtn = document.getElementById('api-help-btn');
      const helpBox = document.getElementById('api-instructions');
      if (helpBtn && helpBox) {
        helpBtn.addEventListener('click', () => {
          helpBox.classList.toggle('hidden');
        });
      }
    });
  </script>
  <script src="app.js"></script>
</body>

</html>
